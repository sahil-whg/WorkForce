<section class="why-us">

    <div class="container">
  
      <div class="text-center mb-5">
        <h2>Why Global Companies Choose Us</h2>
  
        <p>
          Enterprise staffing solutions built on trust,
          quality, and global expertise.
        </p>
      </div>
  
      <div class="row">
  
        <div
          class="col-lg-4 col-md-6 mb-4"
          *ngFor="let reason of reasons"
        >
  
          <div class="reason-card">
  
            <h4>{{ reason.title }}</h4>
  
            <p>
              {{ reason.description }}
            </p>
  
          </div>
  
        </div>
  
      </div>
  
    </div>
  
  </section>
