<section class="request-talent">

    <div class="container">
  
      <div class="row justify-content-center">
  
        <div class="col-lg-8">
  
          <div class="request-card">
  
            <h1>Hire Multilingual Talent</h1>
  
            <p>
              Tell us about your hiring requirements and our recruitment
              specialists will contact you shortly.
            </p>
  
            <div
              class="alert alert-success"
              *ngIf="submitted"
            >
              Thank you. Your hiring request has been submitted.
            </div>
  
            <form
              [formGroup]="form"
              (ngSubmit)="submit()"
            >
  
              <div class="mb-4">
  
                <label class="form-label">
                  Company Name
                </label>
  
                <input
                  type="text"
                  class="form-control"
                  formControlName="company_name"
                >
  
              </div>
  
              <div class="mb-4">
  
                <label class="form-label">
                  Hiring Requirement
                </label>
  
                <textarea
                  rows="4"
                  class="form-control"
                  formControlName="hiring_requirement"
                ></textarea>
  
              </div>
  
              <div class="row">
  
                <div class="col-md-6 mb-4">
  
                  <label class="form-label">
                    Language Needed
                  </label>
  
                  <input
                    type="text"
                    class="form-control"
                    formControlName="language_needed"
                  >
  
                </div>
  
                <div class="col-md-6 mb-4">
  
                  <label class="form-label">
                    Job Role
                  </label>
  
                  <input
                    type="text"
                    class="form-control"
                    formControlName="job_role"
                  >
  
                </div>
  
              </div>
  
              <div class="row">
  
                <div class="col-md-6 mb-4">
  
                  <label class="form-label">
                    Hiring Volume
                  </label>
  
                  <input
                    type="number"
                    class="form-control"
                    formControlName="hiring_volume"
                  >
  
                </div>
  
                <div class="col-md-6 mb-4">
  
                  <label class="form-label">
                    Work Location
                  </label>
  
                  <input
                    type="text"
                    class="form-control"
                    formControlName="work_location"
                  >
  
                </div>
  
              </div>
  
              <div class="mb-4">
  
                <label class="form-label">
                  Budget Range
                </label>
  
                <input
                  type="text"
                  class="form-control"
                  formControlName="budget_range"
                >
  
              </div>
  
              <button
                class="btn btn-primary btn-lg"
                [disabled]="loading"
              >
                {{
                  loading
                    ? 'Submitting...'
                    : 'Request Talent'
                }}
              </button>
  
            </form>
  
          </div>
  
        </div>
  
      </div>
  
    </div>
  
  </section>
